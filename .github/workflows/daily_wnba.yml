name: Update WNBA Data

on:
  schedule:
    - cron: '0 7 18-31 10 *'   # late October (preseason tail)
    - cron: '0 7 * 11-12 *'    # November - December
    - cron: '0 7 * 1-6 *'      # January - June (regular season)
    - cron: '0 7 1-12 7 *'     # early July (regular season tail)
  repository_dispatch:
    types: [daily_wnba_data]
  workflow_dispatch:
    inputs:
      start_year:
        required: false
        type: string
      end_year:
        required: false
        type: string
      use_python_build:
        required: false
        description: "Use the python wnba_data_build processor (default). Set false to roll back to the R processor."
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update_wnba_data:
    # Python (wnba_data_build) owns the 11 daily raw-derived datasets; R is
    # retained for the crosswalks (wnba_11-13), serialize_rds.R, and
    # run_summary.R. Draft is annual -- see annual_wnba_draft.yml.
    runs-on: ubuntu-latest
    name: Update WNBA Data ${{ inputs.start_year }}-${{ inputs.end_year }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      START_YEAR: ${{ inputs.start_year }}
      END_YEAR: ${{ inputs.end_year }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setting up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Setting up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            sportsdataverse/wehoop
            sportsdataverse/sportsdataverse-data
            ropensci/piggyback

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python deps
        working-directory: python
        run: uv sync

      - name: Extract years from trigger dispatch
        if: ${{ github.event.client_payload.event_name == 'daily_wnba_data' }}
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
        run: |
          # `Start:\s*\K[0-9]{4}` keeps the regex anchored to the canonical
          # token in the upstream `WNBA Raw Update (Start: YYYY End: YYYY)`
          # commit message so embedded numbers (PR ids, run ids, error
          # codes) don't shadow the year extraction.
          start=$(printf '%s' "$COMMIT_MESSAGE" | grep -oP 'Start:\s*\K[0-9]{4}' | head -1)
          end=$(printf '%s' "$COMMIT_MESSAGE"   | grep -oP 'End:\s*\K[0-9]{4}'   | head -1)
          echo "START_YEAR=$start" >> $GITHUB_ENV
          echo "END_YEAR=$end"     >> $GITHUB_ENV

      - name: Default year inputs if empty
        if: ${{ env.START_YEAR == '' }}
        shell: bash
        run: |
          echo "START_YEAR=$(Rscript -e 'cat(wehoop::most_recent_wnba_season())')" >> $GITHUB_ENV
          echo "END_YEAR=$(Rscript -e 'cat(wehoop::most_recent_wnba_season())')" >> $GITHUB_ENV

      - name: Update WNBA Data ${{ env.START_YEAR }}-${{ env.END_YEAR }}
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.SDV_GH_TOKEN }}   # R piggyback/sportsdataversedata + contents API
          GH_TOKEN: ${{ secrets.SDV_GH_TOKEN }}      # gh CLI publish (wnba_data_build)
          SPORTSDATAVERSE.UPLOAD.QUIET: FALSE
          SPORTSDATAVERSE.UPLOAD.MAX_TIMES: 20
        run: |
          # Python is the production default (unchanged). use_python_build=false
          # rolls back to the R processor -- kept in-repo for exactly this purpose.
          # Cron / repository_dispatch pass no inputs, so they take the python path.
          if [ "${{ inputs.use_python_build }}" = "false" ]; then
            bash scripts/daily_wnba_R_processor.sh -s ${{ env.START_YEAR }} -e ${{ env.END_YEAR }}
          else
            bash scripts/daily_wnba_data_processor.sh -s ${{ env.START_YEAR }} -e ${{ env.END_YEAR }}
          fi
