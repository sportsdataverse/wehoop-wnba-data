name: Sync Fork with Upstream

on:
  schedule:
    - cron: '30 7 * * *'  # 30 minutes after WNBA data update
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          git remote add upstream https://github.com/sportsdataverse/wehoop-wnba-data.git
          git fetch upstream
          git merge -X theirs upstream/main
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
