name: Sync Fork with Upstream

on:
  schedule:
    - cron: '30 7 * * *'  # 30 minutes after WNBA data update
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write 

    steps:
      - name: Sync fork with upstream
        run: gh repo sync "$GITHUB_REPOSITORY" --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
